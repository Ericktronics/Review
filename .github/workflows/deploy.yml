name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to S3
        run: |
          # Upload hashed assets with long-lived cache (safe because filenames change on rebuild)
          aws s3 sync ./dist/assets/ s3://flash-cards-review/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Upload index.html with no-cache so browsers always fetch the latest
          aws s3 cp ./dist/index.html s3://flash-cards-review/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload everything else (favicons, etc.)
          aws s3 sync ./dist/ s3://flash-cards-review/ \
            --exclude "assets/*" --exclude "index.html" \
            --delete

      # TODO: Add CloudFront distribution ID to GitHub secrets as CLOUDFRONT_DISTRIBUTION_ID
      # then uncomment the step below once the distribution is set up
      # - name: Invalidate CloudFront Cache
      #   run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
